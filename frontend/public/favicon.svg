<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Gradient -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B5FFF"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <!-- Glass Layer -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>

    <!-- Inner Glow -->
    <radialGradient id="glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="40" stdDeviation="40" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <g filter="url(#shadow)">
    <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#grad)"/>

    <!-- Glass top -->
    <rect x="64" y="64" width="896" height="448" rx="220" fill="url(#glass)"/>

    <!-- Inner glow -->
    <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#glow)"/>
  </g>

  <!-- PF Text -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
        font-family="SF Pro Display, Inter, sans-serif"
        font-size="360"
        font-weight="700"
        fill="white"
        letter-spacing="-10">
    PF
  </text>
</svg>